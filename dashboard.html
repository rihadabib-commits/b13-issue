<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- Tailwind + DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="./style.css">
</head>

<body>

         <header class="pt-5">
            <div class="navbar bg-base-100 shadow-sm">
                 <div class="w-10 rounded-full pl-4">
         <img src="B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="" srcset="">
        </div>
  <div class="flex-1">
    <a class="btn btn-ghost text-xl font-semibold">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2"> 
    <input type="text" placeholder="Search issue..."  class="input input-bordered border  w-24 md:w-auto" />
         <button class="bg-[#4A00FF] text-white rounded items-center flex mx-auto pr-4"> <img src="B13-A5-Github-Issue-Tracker/assets/Plus.png" alt="" srcset="">New Issue</button>
      </div>
     
</div>
         </header>


           
           <div class="w-11/12 mx-auto mt-10 bg-[#ffffff]">

    <!-- Button Container -->
    <div class="flex gap-3 p-2 rounded-xl w-fit">

        <!-- All -->
        <button class="px-5 py-2 rounded-md bg-[#4A00FF] text-white  shadow-sm" id="allBtn">
            All
        </button>

        <!-- Open -->
        <button class="px-6 py-2 rounded-md border border-gray-300 bg-white text-gray-600 font-medium " id="openBtn">
            Open
        </button>

        <!-- Closed -->
        <button class="px-6 py-2 rounded-md border border-gray-300 bg-white text-gray-600 font-medium" id="closedBtn">
            Closed
        </button>

    </div>

</div>


          


</div> 
                

                 <div class="w-full bg-[#ffffff] border-t-2 border-dashed border-gray-400 p-4 flex items-center justify-between">

    <!-- Left Side -->
    <div class="flex items-center gap-3 pl-10">
        
        <!-- Icon -->
        <div class="w-10 h-10 bg-purple-200 flex items-center justify-center rounded-full ">
            <img src="B13-A5-Github-Issue-Tracker/assets/Aperture.png" class="w-5" alt="">
        </div>

        <!-- Text -->
        <div>
            <h2 id="issueCount" class="text-lg font-semibold">50 Issues</h2>
            <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>

    </div>

    

    <!-- Right Side -->
    <div class="flex items-center gap-5 text-sm pr-10">

        <div class="flex items-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full"></span>
            <p>Open</p>
        </div>

        <div class="flex items-center gap-2">
            <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
            <p>Closed</p>
        </div>

    </div>

</div>





        <div class="">
     <div id="categoriescontainer" class="grid gird-cols-1 sm:grid-cols-4 pl-10 gap-5">
         <div id="loadingSpinner" class="flex justify-center col-span-4 py-20">
        <span class="loading loading-spinner loading-lg"></span>
    </div>
              <div class=" w-11/12 bg-white rounded-xl shadow p-5 space-y-3">
                <div class="justify-between flex mx-auto ">  
                    <!-- <img src="B13-A5-Github-Issue-Tracker/assets/Open-Status.png/" alt="" srcset=""> -->
        <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">HIGH</span>
        </div>
    
    <div class="flex items-center gap-3">
        <div class="bg-purple-100 p-2 rounded-full">
            
        </div>
        <div>
            <h3 class="font-bold text-lg">Fix Navigation Menu On Mobile Devices</h3>
            <p class="text-gray-500 text-sm">The navigation menu doesn't collapse properly on mobile devices...</p>
        </div>
    </div>

    
    <div class="flex gap-2">
        <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full flex"><img src="B13-A5-Github-Issue-Tracker/assets/BugDroid.png" alt="" srcset="">BUG</span>
      <span class="text-xs bg-yellow-100 text-yellow-600 px-2 py-1 rounded-full flex items-center gap-1">
  <img class="h-3 w-3" src="B13-A5-Github-Issue-Tracker/assets/Lifebuoy.png" alt="">HELP WANTED
</span>
       
    </div>
    <hr>

    
    <div class="text-gray-400 text-xs">
        <span>#1 by john_doe</span>
    
    </div>
        <span class="text-gray-400 text-xs">1/15/2024</span>
     </div>
          </div>

    <!-- You can open the modal using ID.showModal() method -->
<dialog id="issueModal" class="modal">
  <div class="modal-box">
    <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" onclick="issueModal.close()">✕</button>
    <div id="modalContent"></div>
  </div>
</dialog>


        
    <!-- JS -->
    <script src="main.js"></script>
</body>
</html>
